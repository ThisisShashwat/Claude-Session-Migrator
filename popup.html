<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Session Migrator Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base: #f9f8f6;
      --bg-card: #ffffff;
      --border-color: #e3e0d8;
      --text-primary: #191919;
      --text-secondary: #6b7280;
      --accent-color: #191919;
      --accent-hover: #374151;
      --success-color: #15803d;
      --warning-color: #b45309;
      --danger-color: #b91c1c;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 380px;
      background-color: var(--bg-base);
      color: var(--text-primary);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 16px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 12px;
      margin-bottom: 16px;
    }

    h3 {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      background: none;
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      border-radius: 6px;
      padding: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }

    .icon-btn:hover {
      color: var(--text-primary);
      border-color: var(--text-secondary);
      background-color: rgba(0, 0, 0, 0.04);
    }

    .main-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease;
      color: white;
    }

    .btn-primary {
      background-color: var(--accent-color);
    }

    .btn-primary:hover {
      background-color: var(--accent-hover);
    }

    .btn-secondary {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
    }

    .btn-secondary:hover {
      background-color: rgba(0, 0, 0, 0.04);
    }

    .btn:active {
      transform: scale(0.98);
    }

    #status {
      font-size: 12px;
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 16px;
      line-height: 1.4;
      padding: 8px;
      border-radius: 6px;
      background-color: rgba(0, 0, 0, 0.01);
      border: 1px dashed var(--border-color);
    }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }

    #profilesList {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 280px;
      overflow-y: auto;
      padding-right: 4px;
    }

    /* Scrollbar styling */
    #profilesList::-webkit-scrollbar {
      width: 4px;
    }
    #profilesList::-webkit-scrollbar-track {
      background: transparent;
    }
    #profilesList::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 2px;
    }

    .profile-card {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .profile-card.active {
      border-color: #e05c3c;
      box-shadow: 0 0 0 1px #e05c3c;
    }

    .profile-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .profile-title-container {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .profile-name {
      font-size: 14px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: pointer;
    }

    .profile-name input {
      background: var(--bg-base);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      border-radius: 4px;
      padding: 2px 6px;
      outline: none;
      width: 140px;
    }

    .badge-active {
      background-color: #faebe5;
      color: #cc6348;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid #f3d4c9;
    }

    .profile-actions {
      display: flex;
      gap: 6px;
    }

    .action-btn {
      background: none;
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .action-btn:hover {
      color: var(--text-primary);
      border-color: var(--text-secondary);
      background-color: rgba(0, 0, 0, 0.02);
    }

    .action-btn-danger:hover {
      color: white;
      background-color: var(--danger-color);
      border-color: var(--danger-color);
    }

    .quota-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .quota-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-secondary);
    }

    .quota-value {
      font-weight: 600;
      color: var(--text-primary);
    }

    .quota-bar-container {
      width: 100%;
      height: 6px;
      background-color: var(--bg-base);
      border-radius: 3px;
      overflow: hidden;
    }

    .quota-bar {
      height: 100%;
      width: 0%;
      border-radius: 3px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s ease;
    }

    .empty-state {
      color: var(--text-secondary);
      font-size: 12px;
      font-style: italic;
      text-align: center;
      padding: 24px 0;
    }
  </style>
</head>
<body>
  <header>
    <h3>Session Migrator</h3>
    <div class="header-actions">
      <!-- Settings Icon Button -->
      <button class="icon-btn" id="settingsBtn" title="Settings">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      </button>
    </div>
  </header>

  <div class="main-actions">
    <button class="btn btn-primary" id="testCaptureBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
      </svg>
      Add Profile
    </button>
    <button class="btn btn-secondary" id="refreshUsageBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H18" />
      </svg>
      Refresh Quotas
    </button>
  </div>

  <div id="status">Click "Add Profile" or "Refresh Quotas" to begin.</div>

  <div class="section-title">Saved Accounts</div>
  <div id="profilesList">
    <!-- Rendered dynamically -->
  </div>

  <script src="popup.js"></script>
</body>
</html>
